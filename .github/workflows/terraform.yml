name: 'Terraform (multi-stage demo)'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  # --- Stage 1: three parallel jobs ---

  stage1_job1:
    name: 'Stage 1 - Job 1'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Stage 1 - Job 1 work
        run: |
          Write-Host "Stage 1 - Job 1: starting..."
          Start-Sleep -Seconds 2
          Write-Host "Stage 1 - Job 1: finished successfully." -ForegroundColor Green

  stage1_job2:
    name: 'Stage 1 - Job 2'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Stage 1 - Job 2 work
        run: |
          Write-Host "Stage 1 - Job 2: starting..."
          Start-Sleep -Seconds 2
          Write-Host "Stage 1 - Job 2: finished successfully." -ForegroundColor Green

  stage1_job3:
    name: 'Stage 1 - Job 3'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Stage 1 - Job 3 work
        run: |
          Write-Host "Stage 1 - Job 3: starting..."
          Start-Sleep -Seconds 2
          Write-Host "Stage 1 - Job 3: finished successfully." -ForegroundColor Green

  # --- Shared middle stage: runs only if all three Stage 1 jobs succeeded ---

  middle_stage:
    name: 'Middle Stage (10% chance of failure)'
    runs-on: ubuntu-latest
    needs: [stage1_job1, stage1_job2, stage1_job3]   # wait for all 3
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Decide randomly whether to continue (10% fail)
        run: |
          Write-Host "Middle Stage: all Stage 1 jobs succeeded, entering middle stage..."
          Write-Host "Middle Stage: generating random number in range 0–9..."
          
          # Get a random integer from 0 to 9 (inclusive)
          $rand = Get-Random -Minimum 0 -Maximum 10
          
          Write-Host "Middle Stage: RANDOM RESULT = $rand" -ForegroundColor Yellow
          Write-Host "Middle Stage: Rule => 0–8 = SUCCESS (90%), 9 = FAILURE (10%)"

          if ($rand -eq 9) {
            Write-Host "Middle Stage: RESULT = FAILURE (random value was 9). Pipeline will stop here." -ForegroundColor Red
            exit 1  # make this job fail so the final stage does not run
          }
          else {
            Write-Host "Middle Stage: RESULT = SUCCESS (random value was $rand). Pipeline will continue to final stage." -ForegroundColor Green
          }

  # --- Final stage: runs only if middle_stage succeeded ---

  final_stage:
    name: 'Final Stage'
    runs-on: ubuntu-latest
    needs: [middle_stage]
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Final stage work
        run: |
          Write-Host "Final Stage: middle stage succeeded, reaching the final point!" -ForegroundColor Green
          Start-Sleep -Seconds 2
          Write-Host "Final Stage: pipeline finished." -ForegroundColor Green
